name: Supabase Keep-Alive

on:
  schedule:
    # Every Monday at 09:00 UTC — well within Supabase's 7-day inactivity window
    - cron: "0 9 * * 1"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pg
        run: npm install pg --no-save --no-audit --no-fund

      - name: Ping Supabase
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: node scripts/keep-alive.mjs
